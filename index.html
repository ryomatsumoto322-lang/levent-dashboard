<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>湘南ルベントSC U8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;color:#fff;max-width:480px;margin:0 auto;min-height:100vh}
a{text-decoration:none}
button{font-family:inherit;cursor:pointer}
.header{background:#0a0a0a;padding:20px 20px 18px;position:relative;overflow:hidden;z-index:1}
.header-circle{position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.05);pointer-events:none}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.logo-img{height:44px;object-fit:contain;max-width:220px}
.btn-change{background:rgba(255,255,255,0.12);border:none;border-radius:8px;color:rgba(255,255,255,0.6);font-size:11px;padding:6px 10px;position:relative;z-index:10;cursor:pointer}
.header-sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px}
.stats{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;background:rgba(253,216,53,0.15);border:1px solid rgba(253,216,53,0.3);border-radius:10px;padding:7px 6px;text-align:center}
.stat-val{font-size:12px;font-weight:700}
.stat-lbl{font-size:9px;color:rgba(255,255,255,0.55);margin-top:1px}
.tabs{display:flex;background:#111e35;border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto}
.tab{flex:1;min-width:56px;padding:12px 4px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:11px;font-weight:400;border-bottom:2px solid transparent;white-space:nowrap;position:relative;transition:all 0.2s}
.tab.active{color:#1e88e5;font-weight:700;border-bottom:2px solid #1e88e5}
.new-badge{position:absolute;top:6px;right:2px;background:#e53935;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:6px;line-height:1.4}
.content{padding:16px 16px 40px}
.section-label{font-size:11px;color:#90a4ae;letter-spacing:1px;margin-bottom:12px}
.card{background:#f0f4ff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #dce8f5}
.card.match{border:2px solid #1e88e5}
.card.off{border:1px solid #cfd8dc}
.type-badge{font-size:10px;padding:2px 8px;border-radius:20px;color:#fff;font-weight:600;display:inline-block}
.type-match{background:#1e88e5}
.type-practice{background:#fdd835;color:#0d1b2a}
.type-off{background:#90a4ae}
.ev-date{font-size:15px;font-weight:700;margin-top:8px;color:#0d1b2a}
.ev-loc{font-size:12px;color:#546e7a;margin-top:3px}
.ev-note{font-size:11px;color:#e65100;margin-top:3px}
.weather{display:flex;align-items:center;gap:8px;font-size:12px;margin-top:8px;color:#37474f}
.weather span.hot{color:#e74c3c}
.weather span.cold{color:#3498db}
.weather span.rain{color:#78909c}
.map-btns{display:flex;gap:6px;margin-top:6px}
.map-btn{flex:1;padding:6px 4px;border-radius:8px;font-size:11px;font-weight:600;text-align:center;display:block}
.map-btn.map{background:rgba(30,136,229,0.12);border:1px solid rgba(30,136,229,0.3);color:#1565c0}
.map-btn.park{background:rgba(253,216,53,0.2);border:1px solid rgba(253,216,53,0.5);color:#795500}
.items-box{margin-top:10px;background:rgba(30,136,229,0.07);border-radius:8px;padding:10px 12px}
.items-lbl{font-size:11px;color:#546e7a;margin-bottom:6px;font-weight:600}
.items-list{display:flex;flex-wrap:wrap;gap:6px}
.item-tag{font-size:11px;padding:3px 8px;border-radius:20px;background:rgba(30,136,229,0.1);color:#1565c0}
.att-section{margin-top:14px;border-top:1px solid rgba(30,136,229,0.15);padding-top:12px}
.att-lbl{font-size:11px;color:#546e7a;margin-bottom:8px;font-weight:600}
.att-btns{display:flex;gap:8px}
.att-btn{flex:1;padding:7px 4px;border-radius:8px;font-size:11px;font-weight:600;border:2px solid #cfd8dc;background:rgba(0,0,0,0.03);color:#78909c;transition:all 0.15s}
.att-btn.attend.sel{border-color:#2ecc71;background:rgba(46,204,113,0.13);color:#2ecc71}
.att-btn.absent.sel{border-color:#e74c3c;background:rgba(231,76,60,0.13);color:#e74c3c}
.att-btn.unknown.sel{border-color:#95a5a6;background:rgba(149,165,166,0.13);color:#95a5a6}
/* Results */
.result-card{background:#f0f4ff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #dce8f5;display:flex;align-items:center;gap:12px}
.result-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.result-icon.win{background:rgba(46,204,113,0.13)}
.result-icon.draw{background:rgba(52,152,219,0.13)}
.result-icon.lose{background:rgba(231,76,60,0.13)}
.result-name{font-size:13px;font-weight:600;color:#0d1b2a}
.result-tournament{font-size:10px;color:#90a4ae}
.result-score{font-size:20px;font-weight:800;margin-left:auto}
.result-score.win{color:#2ecc71}
.result-score.draw{color:#3498db}
.result-score.lose{color:#e74c3c}
.scorers{margin-top:8px;padding-top:8px;border-top:1px solid rgba(30,136,229,0.1);display:flex;flex-wrap:wrap;gap:6px}
.scorer-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(30,136,229,0.1);color:#1565c0}
.tournament-note{font-size:11px;color:#795500;margin-bottom:12px;font-weight:600}
.award-banner{background:rgba(253,216,53,0.1);border:1px solid rgba(253,216,53,0.4);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#795500}
/* Standings */
.standings-table{background:#f0f4ff;border-radius:14px;overflow:hidden;border:1px solid #dce8f5}
.standings-header{display:grid;grid-template-columns:28px 1fr 32px 32px 32px 36px;gap:4px;padding:10px 14px;background:rgba(30,136,229,0.08);font-size:10px;color:#546e7a}
.standings-row{display:grid;grid-template-columns:28px 1fr 32px 32px 32px 36px;gap:4px;padding:12px 14px;border-top:1px solid #e3eaf5}
.standings-row.us{background:rgba(30,136,229,0.1)}
.standings-row .rank{font-size:13px;font-weight:700}
.standings-row .rank.g{color:#f9a825}
.standings-row .rank.s{color:#78909c}
.standings-row .rank.b{color:#a1887f}
.standings-row .rank.other{color:#b0bec5}
.standings-row .team-name{font-size:13px;color:#0d1b2a}
.standings-row .team-name.us{color:#1565c0;font-weight:700}
.standings-row .num{text-align:center;font-size:13px;color:#546e7a}
.standings-row .pts{text-align:center;font-size:14px;font-weight:700;color:#0d1b2a}
.standings-row .pts.us{color:#1565c0}
.standings-note{font-size:11px;color:#90a4ae;margin-bottom:12px}
/* Scorers */
.scorer-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-top:1px solid #e3eaf5}
.scorer-row:first-child{border-top:none}
.scorer-row.gold{background:rgba(253,216,53,0.08)}
.scorer-medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.scorer-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.scorer-circle.gold{background:rgba(253,216,53,0.2);color:#795500}
.scorer-circle.other{background:rgba(30,136,229,0.08);color:#78909c}
.scorer-name{flex:1;font-size:14px;color:#0d1b2a}
.scorer-name.gold{font-weight:700}
.scorer-goals{display:flex;align-items:center;gap:4px;font-size:20px;font-weight:800}
.scorer-goals.gold{color:#f9a825}
.scorer-goals.other{color:#1e88e5}
/* Announcements */
.ann-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ann-author{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(30,136,229,0.12);color:#1e88e5;font-weight:600}
.ann-new{background:#e53935;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-right:4px}
.ann-date{font-size:10px;color:#90a4ae}
.ann-text{font-size:13px;line-height:1.8;color:#263238;white-space:pre-line}

/* Carpool */
.carpool-section{margin-top:14px;border-top:1px solid rgba(30,136,229,0.15);padding-top:12px}
.carpool-lbl{font-size:11px;color:#546e7a;margin-bottom:8px;font-weight:600}
.carpool-input{width:100%;padding:8px 12px;border:1px solid #dce8f5;border-radius:8px;font-size:13px;color:#0d1b2a;margin-bottom:8px;font-family:inherit}
.carpool-type{display:flex;gap:8px;margin-bottom:8px}
.carpool-type-btn{flex:1;padding:7px 4px;border-radius:8px;border:2px solid #dce8f5;background:white;color:#78909c;font-size:12px;font-weight:600;cursor:pointer}
.carpool-type-btn.sel{border-color:#1e88e5;background:rgba(30,136,229,0.08);color:#1565c0}
.carpool-count{display:flex;gap:6px;margin-bottom:10px}
.carpool-count-btn{flex:1;padding:6px;border-radius:8px;border:2px solid #dce8f5;background:white;color:#78909c;font-size:13px;font-weight:600;cursor:pointer}
.carpool-count-btn.sel{border-color:#1e88e5;background:rgba(30,136,229,0.08);color:#1565c0}
.carpool-submit{width:100%;padding:10px;background:#1e88e5;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px}
.carpool-list{background:rgba(30,136,229,0.04);border-radius:8px;padding:10px 12px}
.carpool-list-lbl{font-size:11px;color:#546e7a;font-weight:600;margin-bottom:8px}
.carpool-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(30,136,229,0.08);font-size:12px;color:#0d1b2a}
.carpool-item:last-child{border-bottom:none}
.carpool-badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600}
.carpool-badge.offer{background:rgba(30,136,229,0.1);color:#1565c0}
.carpool-badge.want{background:rgba(253,216,53,0.2);color:#795500}
/* Calendar btn */
.cal-btn{display:block;width:100%;padding:7px;border-radius:8px;background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.25);color:#2e7d32;font-size:11px;font-weight:600;text-align:center;margin-top:6px;cursor:pointer;text-decoration:none}
/* Login */
.login-header{background:#0a0a0a;padding:40px 24px 32px;text-align:center}
.login-logo{height:48px;object-fit:contain;max-width:220px;margin-bottom:8px}
.login-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px}
.login-body{padding:28px 20px;flex:1}
.login-hint{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:16px;text-align:center}
.player-btn{background:#111e35;border:2px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;width:100%;margin-bottom:8px;text-align:left;transition:all 0.15s}
.player-btn.sel{background:rgba(30,136,229,0.15);border-color:#1e88e5}
.player-num{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.4)}
.player-num.sel{background:#1e88e5;color:#fff}
.player-name{font-size:15px;color:#fff}
.player-name.sel{color:#1e88e5;font-weight:700}
.check-mark{margin-left:auto;color:#1e88e5;font-size:18px}
.login-btn{width:100%;margin-top:16px;padding:16px;background:#1e88e5;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700}
.coach-btn{width:100%;margin-top:10px;padding:12px;background:transparent;border:2px solid rgba(255,255,255,0.1);border-radius:12px;color:rgba(255,255,255,0.4);font-size:13px}
.pin-hint{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:16px;text-align:center}
.pin-input{width:100%;padding:14px 16px;background:#111e35;border:2px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:18px;text-align:center;letter-spacing:8px;outline:none}
.pin-input.err{background:rgba(231,76,60,0.1);border-color:#e74c3c}
.pin-err{color:#e74c3c;font-size:12px;text-align:center;margin-top:8px}
.coach-login-btn{width:100%;margin-top:12px;padding:14px;background:#e67e22;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700}
.back-btn{width:100%;margin-top:8px;padding:10px;background:transparent;border:none;color:rgba(255,255,255,0.3);font-size:13px}
.hidden{display:none}
</style>
</head>
<body>
<script>
(function() {
  const saved = sessionStorage.getItem('luvento_auth');
  if (saved === '2026') return;
  const pw = prompt('パスワードを入力してください');
  if (pw === '2026') {
    sessionStorage.setItem('luvento_auth', '2026');
  } else {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a1628;color:#fff;font-family:sans-serif;font-size:16px;">アクセスできません</div>';
  }
})();
</script>

async function fetchAllData() {
  try {
    const [schedule, results, contact] = await Promise.all([
      fetch(API + "/api/schedule").then(r => r.json()),
      fetch(API + "/api/results").then(r => r.json()),
      fetch(API + "/api/contact").then(r => r.json()),
    ]);
    // Filter out empty rows
    apiData.schedule = schedule.filter(s => s.date || s.location);
    apiData.results = results.filter(r => r.opponent);
    apiData.contact = contact.filter(c => c.text);
    renderContent();
  } catch(e) {
    console.error("API fetch failed:", e);
  }
}


let carpoolData = {};

async function fetchCarpool(eventDate) {
  try {
    const rows = await fetch(API + "/api/carpool").then(r => r.json());
    carpoolData[eventDate] = rows.filter(r => r.eventDate === eventDate);
  } catch(e) {}
}

async function submitCarpool(eventDate, evTitle) {
  const name = document.getElementById('cp-name-' + eventDate).value.trim();
  const type = window['cpType_' + eventDate];
  const count = window['cpCount_' + eventDate];
  if (!name) { alert('お名前を入力してください'); return; }
  if (!type) { alert('種別を選択してください'); return; }
  try {
    await fetch(API + "/api/carpool", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: evTitle, eventDate, parentName: name, type, count: count || 1 })
    });
    await fetchCarpool(eventDate);
    renderContent();
  } catch(e) { alert('送信に失敗しました'); }
}

function carpoolHTML(ev) {
  const date = ev.date;
  const rows = carpoolData[date] || [];
  const offers = rows.filter(r => r.type === '乗せられます');

  return `<div class="carpool-section">
    <div class="carpool-lbl">🚗 送迎マッチング</div>
    <input class="carpool-input" id="cp-name-${date}" placeholder="お名前（例：田中家）" />

  return `<div class="weather">${label} <span class="hot">▲${wx.max}°</span> <span class="cold">▼${wx.min}°</span> <span class="rain">☔${wx.rain}%</span></div>`;

  else if (tab==='出欠集計') { html='<div class="section-label">ATTENDANCE SUMMARY</div>'+coachAttHTML(); }
  else if (tab==='結果') { html='<div class="section-label">MATCH RESULTS</div>'+resultsHTML(); }
  else if (tab==='得点王') { html=scorersHTML(); }
  else if (tab==='順位表') { html='<div class="section-label">STANDINGS</div>'+standingsHTML(); }
  else if (tab==='連絡') { html='<div class="section-label">ANNOUNCEMENTS</div>'+annHTML(); }
  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
